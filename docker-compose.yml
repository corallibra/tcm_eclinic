services:
  postgres:
    image: postgres:16-alpine
    container_name: tcm_eclinic_db
    restart: unless-stopped
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-}
      POSTGRES_DB: ${PG_DATABASE:-tcm_eclinic_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init_postgres_docker.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-tcm_eclinic_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
